    <style>

        }

        }
        .progress-track {
            width: 100%;
            height: 14px;
            border-radius: 999px;
            background: linear-gradient(180deg, #e2e8f0, #f1f5f9);
            overflow: hidden;
            position: relative;
        }
        .progress-fill {
            height: 100%;
            width: 0%;
            border-radius: inherit;
            background: linear-gradient(90deg, #0f766e, #0f172a);
            transition: width 0.35s ease;
            position: relative;
        }
        .progress-fill::after {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.35), transparent);
            transform: translateX(-100%);
            animation: progressShimmer 1.6s linear infinite;
        }
        @keyframes progressShimmer {
            to {
                transform: translateX(100%);
            }
        }
        .progress-fill.is-complete::after,
        .progress-fill.is-idle::after {
            display: none;

        .word-preview table {

        button[disabled] {

        .other-tools-section { margin-top: 1rem; padding-top: 1rem; }
        .section-label {

        .cards-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
            gap: 1rem;
            justify-content: center;
        }
        .tool-card {
            background: #ffffff;
            border-radius: 20px;

<script>
    (function () {
        const input = document.getElementById('wordFileInput');
        const selectBtn = document.getElementById('selectWordBtn');
        const convertBtn = document.getElementById('convertBtn');
        const saveBtn = document.getElementById('savePdfBtn');
        const fileStatus = document.getElementById('fileStatus');
        const dropzone = document.getElementById('dropzone');
        const dropzoneCopy = document.getElementById('dropzoneCopy');
        const preview = document.getElementById('wordPreview');
        const taskStageText = document.getElementById('taskStageText');
        const progressHint = document.getElementById('progressHint');
        const progressPercent = document.getElementById('progressPercent');
        const progressFill = document.getElementById('progressFill');

        let currentFile = null;
        let pdfBlob = null;
        let pdfFileName = 'document.pdf';

        function addPressedEffect(btn) {
            if (!btn) return;
            btn.classList.add('pressed');
            setTimeout(() => btn.classList.remove('pressed'), 150);
        }

        window.FULUTOOL_MESSAGES = window.FULUTOOL_MESSAGES || {};
        window.FULUTOOL_MESSAGES.zh = Object.assign({
            selectWordFirst: '请先选择 Word 文件',
            onlyDocxSupported: '当前浏览器版仅支持 .docx 文件，请先将 .doc 另存为 .docx 再转换',
            converting: '正在转换，请稍候…',
            convertDone: '转换完成，可以保存 PDF 了',
            convertFailed: '转换失败，请换一个 .docx 文件再试试',
            saveFirst: '请先完成转换',
            waitingUpload: '等待上传文件',
            waitingConvert: '等待开始转换',
            taskStageIdle: '等待文件上传',
            taskStageReady: '文件已就绪，等待开始转换',
            taskStageParsing: '正在读取 Word 内容',
            taskStageRendering: '正在生成 PDF 文件',
            taskStageDone: '转换任务已完成',
            taskStageFailed: '转换任务失败',
            fileNotSelected: '📎 尚未选择文件',
            selectedFile: '📎 已选择文件：',
            dropHint: '支持将 .docx 文件拖到这里上传，桌面端拖拽更方便，移动端可直接点击选择文件',
            progressIdleHint: '文件上传后即可开始转换任务',
            progressReadyHint: '已选择文件，点击上方开始转换按钮继续',
            progressParsingHint: '正在解析 Word 文档结构',
            progressRenderingHint: '正在把文档内容写入 PDF',
            progressDoneHint: '转换已完成，请点击下方保存文件按钮下载 PDF 文档',
            progressFailedHint: '任务执行失败，请重新上传或稍后再试'
        }, window.FULUTOOL_MESSAGES.zh || {});
        window.FULUTOOL_MESSAGES.en = Object.assign({
            selectWordFirst: 'Please choose a Word file first',
            onlyDocxSupported: 'This browser-based converter currently supports .docx files only. Please resave .doc as .docx first.',
            converting: 'Converting now, please wait…',
            convertDone: 'Conversion complete. Your PDF is ready to save.',
            convertFailed: 'Conversion failed. Please try another .docx file.',
            saveFirst: 'Please convert the document first',
            waitingUpload: 'Waiting for a file',
            waitingConvert: 'Waiting to start conversion',
            taskStageIdle: 'Waiting for file upload',
            taskStageReady: 'File ready, waiting to start',
            taskStageParsing: 'Reading Word content',
            taskStageRendering: 'Generating PDF output',
            taskStageDone: 'Conversion task completed',
            taskStageFailed: 'Conversion task failed',
            fileNotSelected: '📎 No file selected yet',
            selectedFile: '📎 Selected file:',
            dropHint: 'Drag a .docx file here to upload on desktop, or tap the button to choose a file on mobile.',
            progressIdleHint: 'Upload a file to unlock the conversion task',
            progressReadyHint: 'Your file is ready. Click Start conversion above to continue.',
            progressParsingHint: 'Reading the Word document structure',
            progressRenderingHint: 'Writing the document into a PDF file',
            progressDoneHint: 'The task is complete. Click Save file below to download the PDF document.',
            progressFailedHint: 'The task failed. Please upload again or try later.'
        }, window.FULUTOOL_MESSAGES.en || {});

        const T = (key, fallback) => (window.Fulutool ? Fulutool.t(key, fallback) : fallback);

        function setProgress(percent, state) {
            const safePercent = Math.max(0, Math.min(100, percent));
            progressPercent.textContent = `${safePercent}%`;
            progressFill.style.width = `${safePercent}%`;
            progressFill.classList.remove('is-idle', 'is-complete');
            if (state === 'idle') progressFill.classList.add('is-idle');
            if (state === 'complete') progressFill.classList.add('is-complete');
        }

        function updateTaskWindow(stageKey, hintKey, percent, state) {
            taskStageText.textContent = T(stageKey, '');
            progressHint.textContent = T(hintKey, '');
            setProgress(percent, state);
        }

        function syncStaticText(lang) {
            fileStatus.textContent = currentFile
                ? `${T('selectedFile', '📎 已选择文件：')} ${currentFile.name}`
                : T('fileNotSelected', '📎 尚未选择文件');
            if (dropzoneCopy) {
                dropzoneCopy.textContent = T('dropHint', '支持将 .docx 文件拖到这里上传，桌面端拖拽更方便，移动端可直接点击选择文件');
            }

            if (!currentFile && !pdfBlob) {
                updateTaskWindow('taskStageIdle', 'progressIdleHint', 0, 'idle');
            } else if (currentFile && !pdfBlob) {
                updateTaskWindow('taskStageReady', 'progressReadyHint', 18, 'idle');
            }
        }

        function applySelectedFile(file) {
            currentFile = file || null;
            pdfBlob = null;
            saveBtn.disabled = true;
            convertBtn.disabled = !currentFile;
            preview.innerHTML = '';
            syncStaticText(window.Fulutool ? Fulutool.lang : 'zh');
        }

        async function convertWordToPdf() {
            if (!currentFile) {
                alert(T('selectWordFirst', '请先选择 Word 文件'));
                return;
            }

            const isDocx = /\.docx$/i.test(currentFile.name) || currentFile.type === 'application/vnd.openxmlformats-officedocument.wordprocessingml.document';
            if (!isDocx) {
                alert(T('onlyDocxSupported', '当前浏览器版仅支持 .docx 文件，请先将 .doc 另存为 .docx 再转换'));
                return;
            }

            convertBtn.disabled = true;
            saveBtn.disabled = true;
            pdfBlob = null;
            updateTaskWindow('taskStageParsing', 'progressParsingHint', 38, 'busy');

            try {
                const arrayBuffer = await currentFile.arrayBuffer();
                const result = await mammoth.convertToHtml({ arrayBuffer });
                preview.innerHTML = result.value || '<p></p>';
                preview.querySelectorAll('p, h1, h2, h3, h4, h5, h6, ul, ol, li, blockquote, pre, table, thead, tbody, tr, td, th, figure, img').forEach((el) => {
                    el.classList.add('pdf-avoid-break');
                });
                updateTaskWindow('taskStageRendering', 'progressRenderingHint', 72, 'busy');

                const worker = html2pdf().set({
                    margin: [14, 12, 14, 12],
                    filename: currentFile.name.replace(/\.docx?$/i, '.pdf'),
                    image: { type: 'jpeg', quality: 0.98 },
                    html2canvas: {
                        scale: 2,
                        useCORS: true,
                        backgroundColor: '#ffffff'
                    },
                    jsPDF: {
                        unit: 'mm',
                        format: 'a4',
                        orientation: 'portrait'
                    },
                    pagebreak: {
                        mode: ['avoid-all', 'css', 'legacy'],
                        avoid: ['p', 'h1', 'h2', 'h3', 'h4', 'h5', 'h6', 'ul', 'ol', 'li', 'blockquote', 'pre', 'table', 'thead', 'tbody', 'tr', 'td', 'th', 'figure', 'img', '.pdf-avoid-break']
                    }
                }).from(preview);

                await worker.toPdf();
                const pdf = await worker.get('pdf');
                pdfBlob = pdf.output('blob');
                pdfFileName = currentFile.name.replace(/\.docx?$/i, '.pdf');
                saveBtn.disabled = false;
                updateTaskWindow('taskStageDone', 'progressDoneHint', 100, 'complete');
            } catch (error) {
                console.error(error);
                pdfBlob = null;
                updateTaskWindow('taskStageFailed', 'progressFailedHint', 100, 'complete');
            } finally {
                convertBtn.disabled = false;
            }
        }

        function savePdf() {
            if (!pdfBlob) {
                alert(T('saveFirst', '请先完成转换'));
                return;
            }
            const blobUrl = URL.createObjectURL(pdfBlob);
            const link = document.createElement('a');
            link.href = blobUrl;
            link.download = pdfFileName;
            link.click();
            setTimeout(() => URL.revokeObjectURL(blobUrl), 1000);
        }

        selectBtn.addEventListener('click', () => {
            addPressedEffect(selectBtn);
            input.click();
        });

        input.addEventListener('change', () => {
            applySelectedFile(input.files && input.files[0] ? input.files[0] : null);
        });

        ['dragenter', 'dragover'].forEach((eventName) => {
            dropzone.addEventListener(eventName, (event) => {
                event.preventDefault();
                event.stopPropagation();
                dropzone.classList.add('is-dragover');
            });
        });

        ['dragleave', 'dragend', 'drop'].forEach((eventName) => {
            dropzone.addEventListener(eventName, (event) => {
                event.preventDefault();
                event.stopPropagation();
                if (eventName !== 'drop') {
                    dropzone.classList.remove('is-dragover');
                }
            });
        });

        dropzone.addEventListener('drop', (event) => {
            dropzone.classList.remove('is-dragover');
            const files = event.dataTransfer && event.dataTransfer.files;
            if (!files || !files.length) return;
            const [file] = files;
            try {
                const transfer = new DataTransfer();
                transfer.items.add(file);
                input.files = transfer.files;
            } catch (err) {}
            applySelectedFile(file);
        });

        convertBtn.addEventListener('click', () => {
            addPressedEffect(convertBtn);
            convertWordToPdf();
        });

        saveBtn.addEventListener('click', () => {
            addPressedEffect(saveBtn);
            savePdf();
        });

        window.FULUTOOL_HOOKS = window.FULUTOOL_HOOKS || {};
        const previousReady = window.FULUTOOL_HOOKS.onReady;
        const previousLanguageChange = window.FULUTOOL_HOOKS.onLanguageChange;
        window.FULUTOOL_HOOKS.onReady = function (lang) {
            if (typeof previousReady === 'function') previousReady(lang);
            syncStaticText(lang);
        };
        window.FULUTOOL_HOOKS.onLanguageChange = function (lang) {
            if (typeof previousLanguageChange === 'function') previousLanguageChange(lang);
            syncStaticText(lang);
        };
    })();
</script>
</body>
</html>
