            btn.classList.add('pressed');
            setTimeout(() => btn.classList.remove('pressed'), 150);
        }

        function clamp(value, min, max) {
            return Math.min(max, Math.max(min, value));
        }

        function isCompactScreen() {
            return window.matchMedia('(max-width: 800px)').matches;
        }

        function isWechatBrowser() {
            return /MicroMessenger/i.test(navigator.userAgent || '');
        }

        function scrollToSectionOnMobile(section) {
            if (!section || !isCompactScreen()) return;
            window.setTimeout(() => section.scrollIntoView({ behavior: 'smooth', block: 'start' }), 80);
        }

        function setProgress(percent) {
            const safePercent = clamp(percent, 0, 100);
            progressPercent.textContent = `${safePercent}%`;
            progressFill.style.width = `${safePercent}%`;
        }

        function setTaskState(stageKey, hintKey, percent) {
            taskState = { stageKey, hintKey, percent };
            taskStageText.textContent = T(stageKey, '');
            progressHint.textContent = T(hintKey, '');
            setProgress(percent);
        }

        function syncStaticText() {
            fileStatus.textContent = currentFile ? `${T('selectedFile', '📎 已选择文件：')} ${currentFile.name}` : T('fileNotSelected', '📎 尚未选择文件');
            dropzoneCopy.textContent = T('dropImageHint', '支持 JPG/PNG 图片，桌面端可拖拽上传，移动端可直接点击选择文件');
            document.querySelector('.tool-desc').textContent = T('toolDesc', '上传图片并裁剪，选择画框模板，一键生成真实木质画框包裹的立体美图。');
            document.getElementById('cropTitle').textContent = T('cropTitle', '✂️ 图片裁剪');
            document.getElementById('cropHelp').textContent = T('cropHelp', '拖动 2:3 选框调整照片区域，双指捏合可放大或缩小选区，也可拖动右下角圆点微调。');
            document.getElementById('templateTitle').textContent = T('templateTitle', '选择画框模板');
            selectImageBtn.textContent = T('selectImageBtn', '📂 上传图片');
            generateBtn.textContent = T('generateBtn', '⚡ 生成图片');
            saveBtn.textContent = T('saveBtn', '💾 保存图片');
            const templateLabels = {
                white: 'templateWhite',
                black: 'templateBlack',
                oak: 'templateOak',
                walnut: 'templateWalnut'
            };
            document.querySelectorAll('[data-template-label]').forEach((label) => {
                const key = templateLabels[label.dataset.templateLabel] || 'templateWhite';
                label.textContent = T(key, label.textContent);
            });
            setTaskState(taskState.stageKey, taskState.hintKey, taskState.percent);
        }

        window.FULUTOOL_HOOKS = Object.assign(window.FULUTOOL_HOOKS || {}, {
            onLanguageChange: syncStaticText,
            onReady: syncStaticText
        });

        function updateCropCanvasSize() {
            if (!cropPreviewCanvas) return;
            let previewRatio = 4 / 3;
            if (currentImage) {
                const imageRatio = currentImage.width / currentImage.height || (4 / 3);
                previewRatio = clamp(imageRatio, isCompactScreen() ? 0.56 : 0.62, isCompactScreen() ? 1.18 : 1.45);
            }
            const renderWidth = isCompactScreen() ? 1120 : 1280;
            const renderHeight = Math.round(renderWidth / previewRatio);
            cropPreviewCanvas.width = renderWidth;
            cropPreviewCanvas.height = renderHeight;
            cropPreviewCanvas.style.aspectRatio = `${renderWidth} / ${renderHeight}`;
        }

        function getCropLayout() {
            if (!currentImage || !cropPreviewCanvas) return null;
            const canvasW = cropPreviewCanvas.width;
            const canvasH = cropPreviewCanvas.height;
            const imgRatio = currentImage.width / currentImage.height;
            const canvasRatio = canvasW / canvasH;
            let drawW;
            let drawH;
            let drawX;
            let drawY;
            if (imgRatio > canvasRatio) {
                drawW = canvasW;
                drawH = drawW / imgRatio;
                drawX = 0;
                drawY = (canvasH - drawH) / 2;
            } else {
                drawH = canvasH;
                drawW = drawH * imgRatio;
                drawY = 0;
                drawX = (canvasW - drawW) / 2;
            }
            const targetAspect = 2 / 3;
            let maxCropW;
            let maxCropH;
            if (drawW / drawH > targetAspect) {
                maxCropH = drawH;
                maxCropW = maxCropH * targetAspect;
            } else {
                maxCropW = drawW;
                maxCropH = maxCropW / targetAspect;
            }
            return { canvasW, canvasH, drawW, drawH, drawX, drawY, maxCropW, maxCropH };
        }

        function getCropRect(img) {
            const targetAspect = 2 / 3;
            let baseW;
            let baseH;
            if (img.width / img.height > targetAspect) {
                baseH = img.height;
                baseW = baseH * targetAspect;
            } else {
                baseW = img.width;
                baseH = baseW / targetAspect;
            }
            const scale = clamp(cropState.scale || 1, 0.45, 1);
            const cropW = baseW * scale;
            const cropH = baseH * scale;
            const maxX = Math.max(0, img.width - cropW);
            const maxY = Math.max(0, img.height - cropH);
            const sx = maxX * clamp(cropState.x, 0, 1);
            const sy = maxY * clamp(cropState.y, 0, 1);
            return { sx, sy, sw: cropW, sh: cropH };
        }

        function loadImageFromFile(file) {
            return new Promise((resolve, reject) => {
                const url = URL.createObjectURL(file);
                const img = new Image();
                img.onload = () => {
                    URL.revokeObjectURL(url);
                    resolve(img);
                };
                img.onerror = () => {
                    URL.revokeObjectURL(url);
                    reject(new Error('Image load failed'));
                };
                img.src = url;
            });
        }

        function drawCropPreview() {
            if (!cropPreviewCanvas) return;
            const ctx = cropPreviewCanvas.getContext('2d');
            if (!ctx) return;
            ctx.clearRect(0, 0, cropPreviewCanvas.width, cropPreviewCanvas.height);
            ctx.fillStyle = '#eef4f8';
            ctx.fillRect(0, 0, cropPreviewCanvas.width, cropPreviewCanvas.height);
            if (!currentImage) return;
            const layout = getCropLayout();
            if (!layout) return;
            const { canvasW, canvasH, drawW, drawH, drawX, drawY, maxCropW, maxCropH } = layout;
            ctx.drawImage(currentImage, drawX, drawY, drawW, drawH);
            const cropW = maxCropW * cropState.scale;
            const cropH = maxCropH * cropState.scale;
            const maxCropX = Math.max(0, drawW - cropW);
            const maxCropY = Math.max(0, drawH - cropH);
            const cropX = drawX + maxCropX * cropState.x;
            const cropY = drawY + maxCropY * cropState.y;
            ctx.save();
            ctx.fillStyle = 'rgba(15, 23, 42, 0.38)';
            ctx.fillRect(0, 0, canvasW, cropY);
            ctx.fillRect(0, cropY, cropX, cropH);
            ctx.fillRect(cropX + cropW, cropY, canvasW - (cropX + cropW), cropH);
            ctx.fillRect(0, cropY + cropH, canvasW, canvasH - (cropY + cropH));
            ctx.strokeStyle = '#ffffff';
            ctx.lineWidth = 2;
            ctx.strokeRect(cropX, cropY, cropW, cropH);
            const handleRadius = isCompactScreen() ? 20 : 13;
            const handleX = cropX + cropW;
            const handleY = cropY + cropH;
            ctx.fillStyle = '#ffffff';
            ctx.beginPath();
            ctx.arc(handleX, handleY, handleRadius, 0, Math.PI * 2);
            ctx.fill();
            ctx.strokeStyle = '#0f172a';
            ctx.lineWidth = 1.5;
            ctx.stroke();
            ctx.restore();
            cropPreviewCanvas.dataset.cropX = String(cropX);
            cropPreviewCanvas.dataset.cropY = String(cropY);
            cropPreviewCanvas.dataset.cropW = String(cropW);
            cropPreviewCanvas.dataset.cropH = String(cropH);
            cropPreviewCanvas.dataset.handleX = String(handleX);
            cropPreviewCanvas.dataset.handleY = String(handleY);
            cropPreviewCanvas.dataset.handleRadius = String(handleRadius);
        }

        function updateCropUi() {
            updateCropCanvasSize();
            drawCropPreview();
        }

        function markResultDirty() {
            generatedBlob = null;
            saveBtn.disabled = true;
            resultPreviewWrap.classList.remove('show');
        }

        function getCanvasPoint(event) {
            const rect = cropPreviewCanvas.getBoundingClientRect();
            const x = (event.clientX - rect.left) * (cropPreviewCanvas.width / rect.width);
            const y = (event.clientY - rect.top) * (cropPreviewCanvas.height / rect.height);
            return { x, y };
        }

        function beginPinchInteraction() {
            if (!cropPreviewCanvas || activePointers.size < 2) return;
            const [first, second] = Array.from(activePointers.values()).slice(0, 2);
            pinchInteraction.active = true;
            pinchInteraction.startDistance = Math.max(1, Math.hypot(second.x - first.x, second.y - first.y));
            pinchInteraction.startScale = cropState.scale;
            pinchInteraction.startMidX = (first.x + second.x) / 2;
            pinchInteraction.startMidY = (first.y + second.y) / 2;
            pinchInteraction.startBoxX = cropState.x;
            pinchInteraction.startBoxY = cropState.y;
            cropInteraction.mode = '';
            cropInteraction.pointerId = null;
            cropPreviewCanvas.classList.add('is-resizing');
        }

        function movePinchInteraction() {
            if (!pinchInteraction.active || activePointers.size < 2) return;
            const layout = getCropLayout();
            if (!layout) return;
            const [first, second] = Array.from(activePointers.values()).slice(0, 2);
            const distance = Math.max(1, Math.hypot(second.x - first.x, second.y - first.y));
            const midX = (first.x + second.x) / 2;
            const midY = (first.y + second.y) / 2;
            const nextScale = clamp(pinchInteraction.startScale * (distance / pinchInteraction.startDistance), 0.45, 1);
            const cropW = layout.maxCropW * nextScale;
            const cropH = layout.maxCropH * nextScale;
            const maxCropX = Math.max(1, layout.drawW - cropW);
            const maxCropY = Math.max(1, layout.drawH - cropH);
            cropState.scale = nextScale;
            cropState.x = clamp(pinchInteraction.startBoxX + (midX - pinchInteraction.startMidX) / maxCropX, 0, 1);
            cropState.y = clamp(pinchInteraction.startBoxY + (midY - pinchInteraction.startMidY) / maxCropY, 0, 1);
            drawCropPreview();
        }

        function beginCropInteraction(event) {
            if (!currentImage || !cropPreviewCanvas) return;
            event.preventDefault();
            if (event.pointerId != null) activePointers.set(event.pointerId, getCanvasPoint(event));
            if (activePointers.size >= 2) {
                beginPinchInteraction();
                return;
            }
            const { x, y } = getCanvasPoint(event);
            const cropX = Number(cropPreviewCanvas.dataset.cropX || 0);
            const cropY = Number(cropPreviewCanvas.dataset.cropY || 0);
            const cropW = Number(cropPreviewCanvas.dataset.cropW || 0);
            const cropH = Number(cropPreviewCanvas.dataset.cropH || 0);
            const handleX = Number(cropPreviewCanvas.dataset.handleX || 0);
            const handleY = Number(cropPreviewCanvas.dataset.handleY || 0);
            const handleRadius = Number(cropPreviewCanvas.dataset.handleRadius || 16);
            const handleHit = Math.hypot(x - handleX, y - handleY) <= handleRadius + (isCompactScreen() ? 14 : 8);
            const insideCrop = x >= cropX && x <= cropX + cropW && y >= cropY && y <= cropY + cropH;
            if (!handleHit && !insideCrop) return;
            cropInteraction.mode = handleHit ? 'resize' : 'move';
            cropInteraction.pointerId = event.pointerId != null ? event.pointerId : 1;
            cropInteraction.startX = x;
            cropInteraction.startY = y;
            cropInteraction.startBoxX = cropState.x;
            cropInteraction.startBoxY = cropState.y;
            cropInteraction.startScale = cropState.scale;
            cropPreviewCanvas.classList.toggle('is-dragging', cropInteraction.mode === 'move');
            cropPreviewCanvas.classList.toggle('is-resizing', cropInteraction.mode === 'resize');
            if (cropPreviewCanvas.setPointerCapture && event.pointerId != null) {
                cropPreviewCanvas.setPointerCapture(event.pointerId);
            }
        }

        function moveCropInteraction(event) {
            if (!currentImage || !cropPreviewCanvas) return;
            if (event.pointerId != null && activePointers.has(event.pointerId)) {
                activePointers.set(event.pointerId, getCanvasPoint(event));
            }
            if (pinchInteraction.active && activePointers.size >= 2) {
                event.preventDefault();
                movePinchInteraction();
                return;
            }
            if (!cropInteraction.mode || cropInteraction.pointerId !== event.pointerId) return;
            event.preventDefault();
            const { x, y } = getCanvasPoint(event);
            const layout = getCropLayout();
            if (!layout) return;
            const { drawW, drawH, maxCropW, maxCropH } = layout;
            if (cropInteraction.mode === 'move') {
                const cropW = maxCropW * cropState.scale;
                const cropH = maxCropH * cropState.scale;
                cropState.x = clamp(cropInteraction.startBoxX + (x - cropInteraction.startX) / Math.max(1, drawW - cropW), 0, 1);
                cropState.y = clamp(cropInteraction.startBoxY + (y - cropInteraction.startY) / Math.max(1, drawH - cropH), 0, 1);
            } else if (cropInteraction.mode === 'resize') {
                const delta = Math.max(x - cropInteraction.startX, y - cropInteraction.startY);
                cropState.scale = clamp(cropInteraction.startScale + delta / Math.max(maxCropW, maxCropH), 0.45, 1);
            }
            drawCropPreview();
            markResultDirty();
        }

        function endCropInteraction(event) {
            if (!cropPreviewCanvas) return;
            if (cropPreviewCanvas.releasePointerCapture && event.pointerId != null) {
                try { cropPreviewCanvas.releasePointerCapture(event.pointerId); } catch (err) {}
            }
            if (event.pointerId != null) activePointers.delete(event.pointerId);
            if (pinchInteraction.active && activePointers.size < 2) {
                pinchInteraction.active = false;
                cropPreviewCanvas.classList.remove('is-resizing');
            }
            if (cropInteraction.pointerId == null || cropInteraction.pointerId === event.pointerId || activePointers.size === 0) {
                cropInteraction.mode = '';
                cropInteraction.pointerId = null;
                cropPreviewCanvas.classList.remove('is-dragging', 'is-resizing');
            }
        }

        function getDestSourceRect(img, destW, destH, cropRect) {
            const rect = cropRect || getCropRect(img);
            const destRatio = destW / destH;
            const rectRatio = rect.sw / rect.sh;
            if (rectRatio > destRatio) {
                const sw = rect.sh * destRatio;
                return { sx: rect.sx + (rect.sw - sw) / 2, sy: rect.sy, sw, sh: rect.sh };
            }
            const sh = rect.sw / destRatio;
            return { sx: rect.sx, sy: rect.sy + (rect.sh - sh) / 2, sw: rect.sw, sh };
        }

        function drawCroppedCover(ctx, img, dx, dy, dw, dh, cropRect) {
            const src = getDestSourceRect(img, dw, dh, cropRect);
            ctx.drawImage(img, src.sx, src.sy, src.sw, src.sh, dx, dy, dw, dh);
        }

        function roundedRect(ctx, x, y, w, h, r) {
            const radius = Math.min(r, w / 2, h / 2);
            ctx.beginPath();
            ctx.moveTo(x + radius, y);
            ctx.arcTo(x + w, y, x + w, y + h, radius);
            ctx.arcTo(x + w, y + h, x, y + h, radius);
            ctx.arcTo(x, y + h, x, y, radius);
            ctx.arcTo(x, y, x + w, y, radius);
            ctx.closePath();
        }

        function drawInnerDepthShadow(ctx, inner, scale = 1) {
            ctx.save();
            ctx.filter = `blur(${Math.max(5, 8 * scale)}px)`;
            const topDepth = 128 * scale;
            const leftDepth = 116 * scale;
            const rightDepth = 96 * scale;
            const bottomDepth = 88 * scale;
            let gradient = ctx.createLinearGradient(0, inner.y, 0, inner.y + topDepth);
            gradient.addColorStop(0, 'rgba(2, 6, 23, 0.72)');
            gradient.addColorStop(0.22, 'rgba(2, 6, 23, 0.42)');
            gradient.addColorStop(0.54, 'rgba(2, 6, 23, 0.16)');
            gradient.addColorStop(0.82, 'rgba(2, 6, 23, 0.04)');
            gradient.addColorStop(1, 'rgba(2, 6, 23, 0)');
            ctx.fillStyle = gradient;
            ctx.fillRect(inner.x, inner.y, inner.w, topDepth);

            gradient = ctx.createLinearGradient(inner.x, 0, inner.x + leftDepth, 0);
            gradient.addColorStop(0, 'rgba(2, 6, 23, 0.62)');
            gradient.addColorStop(0.24, 'rgba(2, 6, 23, 0.34)');
            gradient.addColorStop(0.56, 'rgba(2, 6, 23, 0.13)');
            gradient.addColorStop(0.84, 'rgba(2, 6, 23, 0.04)');
            gradient.addColorStop(1, 'rgba(2, 6, 23, 0)');
            ctx.fillStyle = gradient;
            ctx.fillRect(inner.x, inner.y, leftDepth, inner.h);

            gradient = ctx.createLinearGradient(inner.x + inner.w, 0, inner.x + inner.w - rightDepth, 0);
            gradient.addColorStop(0, 'rgba(2, 6, 23, 0.38)');
            gradient.addColorStop(0.26, 'rgba(2, 6, 23, 0.20)');
            gradient.addColorStop(0.58, 'rgba(2, 6, 23, 0.08)');
            gradient.addColorStop(0.84, 'rgba(2, 6, 23, 0.03)');
            gradient.addColorStop(1, 'rgba(2, 6, 23, 0)');
            ctx.fillStyle = gradient;
            ctx.fillRect(inner.x + inner.w - rightDepth, inner.y, rightDepth, inner.h);

            gradient = ctx.createLinearGradient(0, inner.y + inner.h, 0, inner.y + inner.h - bottomDepth);
            gradient.addColorStop(0, 'rgba(2, 6, 23, 0.34)');
            gradient.addColorStop(0.26, 'rgba(2, 6, 23, 0.18)');
            gradient.addColorStop(0.58, 'rgba(2, 6, 23, 0.07)');
            gradient.addColorStop(0.84, 'rgba(2, 6, 23, 0.02)');
            gradient.addColorStop(1, 'rgba(2, 6, 23, 0)');
            ctx.fillStyle = gradient;
            ctx.fillRect(inner.x, inner.y + inner.h - bottomDepth, inner.w, bottomDepth);
            ctx.restore();
        }

        function drawWoodTexture(ctx, outer, inner, template) {
            ctx.save();
            ctx.beginPath();
            ctx.rect(outer.x, outer.y, outer.w, outer.h);
            ctx.rect(inner.x, inner.y, inner.w, inner.h);
            ctx.clip('evenodd');

            const textureProfile = {
                white: {
                    dark: 'rgba(71, 85, 105, 0.045)',
                    light: 'rgba(255, 255, 255, 0.12)',
                    mid: 'rgba(148, 163, 184, 0.035)',
                    knots: 'rgba(148, 163, 184, 0.035)',
                    fineAlpha: 0.06,
                    bandAlpha: 0.05
                },
                black: {
                    dark: 'rgba(255, 255, 255, 0.065)',
                    light: 'rgba(255, 255, 255, 0.035)',
                    mid: 'rgba(15, 23, 42, 0.18)',
                    knots: 'rgba(255, 255, 255, 0.035)',
                    fineAlpha: 0.06,
                    bandAlpha: 0.06
                },
                oak: {
                    dark: 'rgba(122, 84, 41, 0.30)',
                    light: 'rgba(255, 239, 204, 0.28)',
                    mid: 'rgba(185, 134, 71, 0.18)',
                    knots: 'rgba(109, 75, 39, 0.18)',
                    fineAlpha: 0.22,
                    bandAlpha: 0.15
                },
                walnut: {
                    dark: 'rgba(33, 18, 11, 0.36)',
                    light: 'rgba(175, 111, 63, 0.24)',
                    mid: 'rgba(88, 50, 29, 0.24)',
                    knots: 'rgba(28, 15, 9, 0.22)',
                    fineAlpha: 0.26,
                    bandAlpha: 0.18
                }
            };
            const profile = textureProfile[selectedTemplate] || textureProfile.oak;

            for (let i = 0; i < 18; i += 1) {
                const x = outer.x + outer.w * ((i + 0.35) / 18);
                const bandW = outer.w * (0.018 + (i % 5) * 0.005);
                const gradient = ctx.createLinearGradient(x - bandW, 0, x + bandW, 0);
                gradient.addColorStop(0, 'rgba(255,255,255,0)');
                gradient.addColorStop(0.42, i % 2 ? profile.mid : profile.light);
                gradient.addColorStop(0.58, i % 2 ? profile.dark : profile.mid);
                gradient.addColorStop(1, 'rgba(255,255,255,0)');
                ctx.globalAlpha = profile.bandAlpha;
                ctx.fillStyle = gradient;
                ctx.fillRect(x - bandW, outer.y, bandW * 2, outer.h);
            }

            for (let i = 0; i < 180; i += 1) {
                const x = outer.x + 4 + i * (outer.w / 179);
                const wobble = 3 + (i % 9) * 0.65;
                ctx.globalAlpha = profile.fineAlpha * (0.45 + (i % 7) * 0.08);
                ctx.strokeStyle = i % 3 === 0 ? profile.dark : i % 3 === 1 ? profile.light : profile.mid;
                ctx.lineWidth = i % 11 === 0 ? 1.2 : i % 5 === 0 ? 0.8 : 0.38;
                ctx.beginPath();
                ctx.moveTo(x, outer.y + 2);
                ctx.bezierCurveTo(
                    x - wobble,
                    outer.y + outer.h * 0.22,
                    x + wobble,
                    outer.y + outer.h * 0.64,
                    x + ((i % 5) - 2) * 0.9,
                    outer.y + outer.h - 2
                );
                ctx.stroke();
            }

            for (let i = 0; i < 10; i += 1) {
                const centerX = outer.x + outer.w * (0.12 + (i / 10) * 0.76);
                const topY = outer.y + outer.h * (0.06 + (i % 5) * 0.11);
                const bottomY = topY + outer.h * (0.18 + (i % 4) * 0.035);
                ctx.globalAlpha = selectedTemplate === 'white' || selectedTemplate === 'black' ? 0.55 : 1;
                ctx.strokeStyle = profile.knots;
                ctx.lineWidth = 0.9 + (i % 3) * 0.28;
                ctx.beginPath();
                ctx.moveTo(centerX - 5, topY);
                ctx.bezierCurveTo(
                    centerX + 12,
                    topY + outer.h * 0.05,
                    centerX - 12,
                    bottomY - outer.h * 0.05,
                    centerX + 5,
                    bottomY
                );
                ctx.stroke();
            }

            const fw = inner.x - outer.x;
            ctx.globalAlpha = 0.28;
            ctx.strokeStyle = 'rgba(25, 16, 10, 0.34)';
            ctx.lineWidth = 1.2;

            ctx.beginPath();
            ctx.moveTo(outer.x, outer.y);
            ctx.lineTo(inner.x, inner.y);
            ctx.moveTo(outer.x + outer.w, outer.y);
            ctx.lineTo(inner.x + inner.w, inner.y);
            ctx.moveTo(outer.x, outer.y + outer.h);
            ctx.lineTo(inner.x, inner.y + inner.h);
            ctx.moveTo(outer.x + outer.w, outer.y + outer.h);
            ctx.lineTo(inner.x + inner.w, inner.y + inner.h);
            ctx.stroke();

            ctx.globalAlpha = 0.28;
            ctx.lineWidth = Math.max(10, fw * 0.12);
            ctx.strokeStyle = 'rgba(255, 255, 255, 0.12)';
            ctx.strokeRect(outer.x + fw * 0.18, outer.y + fw * 0.18, outer.w - fw * 0.36, outer.h - fw * 0.36);
            ctx.restore();
        }

        function drawFrameBevel(ctx, outer, inner, template, scale = 1) {
            const frameWidth = Math.max(1, inner.x - outer.x);
            ctx.save();
            ctx.beginPath();
            ctx.rect(outer.x, outer.y, outer.w, outer.h);
            ctx.rect(inner.x, inner.y, inner.w, inner.h);
            ctx.clip('evenodd');

            let gradient = ctx.createLinearGradient(outer.x, outer.y, outer.x, outer.y + frameWidth * 1.15);
            gradient.addColorStop(0, 'rgba(255, 255, 255, 0.58)');
            gradient.addColorStop(0.42, 'rgba(255, 255, 255, 0.18)');
            gradient.addColorStop(1, 'rgba(255, 255, 255, 0)');
            ctx.fillStyle = gradient;
            ctx.fillRect(outer.x, outer.y, outer.w, frameWidth * 1.2);

            gradient = ctx.createLinearGradient(outer.x, outer.y, outer.x + frameWidth * 1.05, outer.y);
            gradient.addColorStop(0, 'rgba(255, 255, 255, 0.38)');
            gradient.addColorStop(1, 'rgba(255, 255, 255, 0)');
            ctx.fillStyle = gradient;
            ctx.fillRect(outer.x, outer.y, frameWidth * 1.1, outer.h);

            gradient = ctx.createLinearGradient(outer.x + outer.w, outer.y, outer.x + outer.w - frameWidth * 1.18, outer.y);
            gradient.addColorStop(0, 'rgba(2, 6, 23, 0.22)');
            gradient.addColorStop(1, 'rgba(2, 6, 23, 0)');
            ctx.fillStyle = gradient;
            ctx.fillRect(outer.x + outer.w - frameWidth * 1.2, outer.y, frameWidth * 1.2, outer.h);

            gradient = ctx.createLinearGradient(outer.x, outer.y + outer.h, outer.x, outer.y + outer.h - frameWidth * 1.2);
            gradient.addColorStop(0, 'rgba(2, 6, 23, 0.26)');
            gradient.addColorStop(1, 'rgba(2, 6, 23, 0)');
            ctx.fillStyle = gradient;
            ctx.fillRect(outer.x, outer.y + outer.h - frameWidth * 1.25, outer.w, frameWidth * 1.25);

            ctx.restore();
        }

        function drawInnerEdgeLine(ctx, inner, scale = 1) {
            ctx.save();
            ctx.shadowColor = 'rgba(2, 6, 23, 0.20)';
            ctx.shadowBlur = 5 * scale;
            ctx.shadowOffsetX = 0;
            ctx.shadowOffsetY = 1.2 * scale;
            ctx.strokeStyle = selectedTemplate === 'black'
                ? 'rgba(192, 199, 210, 0.38)'
                : 'rgba(118, 126, 138, 0.46)';
            ctx.lineWidth = Math.max(0.9, 1.25 * scale);
            ctx.strokeRect(
                inner.x + 0.5 * scale,
                inner.y + 0.5 * scale,
                inner.w - 1 * scale,
                inner.h - 1 * scale
            );
            ctx.restore();
        }

        function drawMiterJoints(ctx, outer, inner, template) {
            ctx.save();
            if (selectedTemplate === 'white') {
                ctx.strokeStyle = 'rgba(100, 116, 139, 0.30)';
                ctx.lineWidth = 1.1;
            } else if (selectedTemplate === 'black') {
                ctx.strokeStyle = 'rgba(255, 255, 255, 0.14)';
                ctx.lineWidth = 1.1;
            } else {
                ctx.strokeStyle = 'rgba(18, 12, 8, 0.36)';
                ctx.lineWidth = 1.3;
            }
            ctx.beginPath();
            ctx.moveTo(outer.x, outer.y);
            ctx.lineTo(inner.x, inner.y);
            ctx.moveTo(outer.x + outer.w, outer.y);
            ctx.lineTo(inner.x + inner.w, inner.y);
            ctx.moveTo(outer.x, outer.y + outer.h);
            ctx.lineTo(inner.x, inner.y + inner.h);
            ctx.moveTo(outer.x + outer.w, outer.y + outer.h);
            ctx.lineTo(inner.x + inner.w, inner.y + inner.h);
            ctx.stroke();

            if (['oak', 'walnut'].includes(selectedTemplate)) {
                ctx.strokeStyle = 'rgba(255, 255, 255, 0.10)';
                ctx.lineWidth = 0.7;
                ctx.beginPath();
                ctx.moveTo(outer.x + 5, outer.y + 2);
                ctx.lineTo(inner.x + 4, inner.y + 2);
                ctx.moveTo(outer.x + outer.w - 5, outer.y + 2);
                ctx.lineTo(inner.x + inner.w - 4, inner.y + 2);
                ctx.stroke();
            }
            ctx.restore();
        }

        function getFrameRects(width, height) {
            const scale = width / 1200;
            const outer = { x: 0, y: 0, w: width, h: height };
            const sideFrameWidth = Math.round(132 * scale);
            const innerW = width - sideFrameWidth * 2;
            const innerH = innerW * 3 / 2;
            const inner = {
                x: sideFrameWidth,
                y: (height - innerH) / 2,
                w: innerW,
                h: innerH
            };
            return { outer, inner, scale };
        }

        function drawFrameBase(ctx, img, cropRect, template, outer, inner, scale = 1) {
            ctx.clearRect(0, 0, outer.w, outer.h);
            ctx.filter = 'none';
            ctx.globalAlpha = 1;
            ctx.globalCompositeOperation = 'source-over';

            ctx.save();
            ctx.fillStyle = template.frame;
            ctx.fillRect(outer.x, outer.y, outer.w, outer.h);
            ctx.restore();

            drawWoodTexture(ctx, outer, inner, template);
            drawFrameBevel(ctx, outer, inner, template, scale);

            ctx.save();
            ctx.shadowColor = 'rgba(2, 6, 23, 0.78)';
            ctx.shadowBlur = 72 * scale;
            ctx.shadowOffsetX = -32 * scale;
            ctx.shadowOffsetY = 34 * scale;
            ctx.fillStyle = 'rgba(0, 0, 0, 0.46)';
            ctx.fillRect(inner.x, inner.y, inner.w, inner.h);
            ctx.restore();

            ctx.save();
            ctx.beginPath();
            ctx.rect(inner.x, inner.y, inner.w, inner.h);
            ctx.clip();
            ctx.drawImage(img, cropRect.sx, cropRect.sy, cropRect.sw, cropRect.sh, inner.x, inner.y, inner.w, inner.h);
            drawInnerDepthShadow(ctx, inner, scale);
            ctx.restore();

            drawInnerEdgeLine(ctx, inner, scale);
            drawMiterJoints(ctx, outer, inner, template);
        }

        async function composeFrameArt() {
            const width = 1200;
            const height = 1600;
            const canvas = document.createElement('canvas');
            canvas.width = width;
            canvas.height = height;
            const ctx = canvas.getContext('2d');
            const cropRect = getCropRect(currentImage);
            const template = TEMPLATES[selectedTemplate] || TEMPLATES.white;
            const { outer, inner, scale } = getFrameRects(width, height);

            drawFrameBase(ctx, currentImage, cropRect, template, outer, inner, scale);

            return canvas;
        }

        function delay(ms) {
            return new Promise((resolve) => setTimeout(resolve, ms));
        }

        async function generateImage() {
            if (isGenerating) return;
            if (!currentImage) {
                alert(T('selectImageFirst', '请先上传一张图片'));
                return;
            }
            addPressedEffect(generateBtn);
            isGenerating = true;
            saveBtn.disabled = true;
            resultPreviewWrap.classList.remove('show');
            taskStatusSection.classList.add('show');
            scrollToSectionOnMobile(taskStatusSection);
            try {
                setTaskState('taskStageGenerating', 'progressGeneratingHint', 18);
                await delay(120);
                const canvas = await composeFrameArt();
                setProgress(78);
                generatedBlob = await new Promise((resolve) => canvas.toBlob(resolve, 'image/png', 0.96));
                if (!generatedBlob) throw new Error('Failed to create image');
                generatedName = `fulutool-frame-art-${selectedTemplate}-${Date.now()}.png`;
                if (previewUrl) URL.revokeObjectURL(previewUrl);
                previewUrl = URL.createObjectURL(generatedBlob);
                resultPreview.src = previewUrl;
                resultPreviewWrap.classList.add('show');
                saveBtn.disabled = false;
                setTaskState('taskStageDone', 'progressDoneHint', 100);
            } catch (err) {
                console.error(err);
                setTaskState('taskStageFailed', 'progressFailedHint', 0);
            } finally {
                isGenerating = false;
            }
        }

        function saveImage() {
            addPressedEffect(saveBtn);
            if (!generatedBlob || !previewUrl) {
                alert(T('saveFirst', '请先生成图片'));
                return;
            }
            if (isWechatBrowser()) {
                alert(T('saveWechatTip', '微信内置浏览器不支持直接下载。请长按下方预览图并选择“保存图片”'));
                resultPreview.scrollIntoView({ behavior: 'smooth', block: 'center' });
                return;
            }
            const link = document.createElement('a');
            link.href = previewUrl;
            link.download = generatedName;
            document.body.appendChild(link);
            link.click();
            link.remove();
        }

        async function handleFile(file) {
            if (!file || !/^image\/(jpeg|png)$/i.test(file.type)) {
                alert(T('invalidImage', '请选择 JPG 或 PNG 图片'));
                return;
            }
            currentFile = file;
            currentImage = await loadImageFromFile(file);
            cropState = { scale: 1, x: 0.5, y: 0.5 };
            generatedBlob = null;
            saveBtn.disabled = true;
            generateBtn.disabled = false;
            resultPreviewWrap.classList.remove('show');
            cropShell.classList.add('show');
            templateSection.classList.add('show');
            updateCropUi();
            setTaskState('taskStageReady', 'progressReadyHint', 12);
            syncStaticText();
            scrollToSectionOnMobile(cropShell);
        }

        function setTemplate(templateName) {
            selectedTemplate = TEMPLATES[templateName] ? templateName : 'white';
            templateOptions.forEach((option) => {
                const active = option.dataset.template === selectedTemplate;
                option.classList.toggle('is-active', active);
                option.setAttribute('aria-pressed', active ? 'true' : 'false');
            });
            generatedBlob = null;
            saveBtn.disabled = true;
            resultPreviewWrap.classList.remove('show');
            markResultDirty();
        }

        selectImageBtn.addEventListener('click', () => {
            addPressedEffect(selectImageBtn);
            imageInput.click();
        });
        imageInput.addEventListener('change', () => {
            const file = imageInput.files && imageInput.files[0];
            if (file) handleFile(file);
        });
        ['dragenter', 'dragover'].forEach((name) => {
            dropzone.addEventListener(name, (event) => {
                event.preventDefault();
                dropzone.classList.add('is-dragover');
            });
        });
        ['dragleave', 'drop'].forEach((name) => {
            dropzone.addEventListener(name, (event) => {
                event.preventDefault();
                dropzone.classList.remove('is-dragover');
            });
        });
        dropzone.addEventListener('drop', (event) => {
            const file = event.dataTransfer && event.dataTransfer.files && event.dataTransfer.files[0];
            if (file) handleFile(file);
        });
        templateOptions.forEach((option) => option.addEventListener('click', () => {
            addPressedEffect(option);
            setTemplate(option.dataset.template);
        }));
        generateBtn.addEventListener('click', generateImage);
        saveBtn.addEventListener('click', saveImage);
        cropPreviewCanvas.addEventListener('pointerdown', beginCropInteraction);
        cropPreviewCanvas.addEventListener('pointermove', moveCropInteraction);
        cropPreviewCanvas.addEventListener('pointerup', endCropInteraction);
        cropPreviewCanvas.addEventListener('pointercancel', endCropInteraction);
        cropPreviewCanvas.addEventListener('pointerleave', (event) => {
            if (cropInteraction.mode && !cropPreviewCanvas.hasPointerCapture?.(event.pointerId)) endCropInteraction(event);
        });
        window.addEventListener('resize', () => {
            if (currentImage) {
                updateCropUi();
            }
        });
        setTaskState('taskStageIdle', 'progressIdleHint', 0);
        syncStaticText();
    })();
</script>
</body>
</html>
