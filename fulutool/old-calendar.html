            font-size: 0.9rem;
        }
        .dropzone {

            margin-bottom: 1rem;

        .dropzone.is-dragover {
            border-color: rgba(15, 118, 110, 0.45);

        .template-section {

            border: 1px solid #e2e8f0;

            margin: 0;
            padding: 0.8rem;

            border: 1px solid #e2e8f0;

            text-align: center;

            background: #f8fafc;
            border-color: #cbd5e1;
        }
        .template-option.is-active {
            border-color: #0f766e;
            box-shadow: 0 0 0 3px rgba(15, 118, 110, 0.12);
        }
        .template-icon {
            width: 88px;
            height: 120px;
            display: block;
        }
        .template-name {
            font-size: 0.86rem;
            font-weight: 700;
            line-height: 1.3;
        }
        .field {
            display: grid;
            gap: 0.4rem;
            min-width: 180px;
            flex: 1 1 180px;
        }
        .field label {
            font-size: 0.82rem;
            font-weight: 600;
            color: #475569;
        }
        select {
            width: 100%;
            border-radius: 14px;
            border: 1px solid #d7e1ed;
            background: #f8fafc;
            padding: 0.62rem 0.75rem;
            color: #0f172a;
            font-size: 0.92rem;
        }
        .file-pill {
            display: inline-flex;
            align-items: flex-start;
            gap: 0.45rem;
            min-height: 46px;
            min-width: 0;
            max-width: 100%;
            padding: 0.8rem 1rem;
            border-radius: 18px;
            border: 1px solid #e2e8f0;
            background: #f8fafc;
            color: #475569;
            font-size: 0.86rem;
            flex: 1 1 240px;
            white-space: normal;
            overflow-wrap: anywhere;
            word-break: break-word;

        .preview-shell {
            margin-top: 1rem;
            background: #f8fafc;
            border-radius: 24px;
            border: 1px solid #e2e8f0;
            padding: 1rem;
        }
        .crop-shell {
            display: none;
            margin-bottom: 1rem;
            background: #f8fafc;
            border-radius: 24px;
            border: 1px solid #e2e8f0;
            padding: 1rem;
        }
        .crop-shell.show {
            display: block;
        }
        .crop-stage {
            display: grid;
            gap: 0.8rem;
        }
        .crop-preview-frame {
            background: #ffffff;
            border: 1px solid #e5e7eb;
            border-radius: 18px;
            padding: 0.9rem;
        }
        .crop-preview-canvas {
            width: 100%;
            aspect-ratio: 4 / 3;
            border-radius: 14px;
            display: block;
            background: linear-gradient(180deg, #f8fafc, #eef4f8);
            touch-action: none;
            cursor: grab;
        }
        .crop-preview-canvas.is-dragging,
        .crop-preview-canvas.is-resizing {
            cursor: grabbing;
        }
        .crop-help {
            color: #64748b;
            font-size: 0.82rem;
            line-height: 1.65;
        }
        .preview-title {
            font-size: 0.82rem;
            font-weight: 600;
            color: #475569;
            margin-bottom: 0.8rem;
        }
        .preview-frame {
            background: #ffffff;
            border: 1px solid #e5e7eb;
            border-radius: 18px;
            min-height: 250px;
            padding: 1.2rem;
            box-shadow: inset 0 1px 2px rgba(15, 23, 42, 0.04);
            display: flex;
            flex-direction: column;
            justify-content: center;
            gap: 1rem;
        }
        .task-stage {
            display: grid;
            gap: 0.45rem;
        }
        .task-stage-label {
            font-size: 0.8rem;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            color: #94a3b8;
            font-weight: 700;
        }
        .task-stage-text {
            color: #0f172a;
            line-height: 1.7;
            font-size: 0.98rem;
            font-weight: 600;
            word-break: break-word;
        }
        .progress-shell {
            display: grid;
            gap: 0.55rem;
        }
        .progress-meta {
            display: flex;
            justify-content: space-between;
            gap: 1rem;
            align-items: center;
            color: #64748b;
            font-size: 0.82rem;
        }
        .progress-track {
            width: 100%;
            height: 14px;
            border-radius: 999px;
            background: linear-gradient(180deg, #e2e8f0, #f1f5f9);
            overflow: hidden;
            position: relative;
        }
        .progress-fill {
            height: 100%;
            width: 0%;
            border-radius: inherit;
            background: linear-gradient(90deg, #0f766e, #0f172a);
            transition: width 0.35s ease;
            position: relative;
        }
        .progress-fill::after {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.35), transparent);
            transform: translateX(-100%);
            animation: progressShimmer 1.6s linear infinite;
        }
        @keyframes progressShimmer {
            to { transform: translateX(100%); }
        }
        .progress-fill.is-complete::after,
        .progress-fill.is-idle::after {
            display: none;
        }
        .result-preview-wrap {
            border-radius: 16px;
            overflow: hidden;
            border: 1px solid #e2e8f0;
            background: #f8fafc;
            display: none;
        }
        .result-preview-wrap.show {
            display: block;
        }
        .result-preview-wrap img {
            width: 100%;
            height: auto;
            display: block;
        }
        .save-row {
            display: flex;
            justify-content: center;
            margin-top: 1.1rem;
        }
        input[type="file"] { display: none; }
        button {
            background: #f1f5f9;
            border: 1px solid #e2e8f0;
            padding: 0.6rem 1.3rem;
            border-radius: 40px;
            font-weight: 500;
            font-size: 0.85rem;
            color: #1e293b;
            cursor: pointer;
            transition: all 0.2s;
            margin-right: 0.6rem;
            margin-bottom: 0.5rem;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }
        button.primary { background: #0f172a; color: white; border: none; }
        button.primary:hover { background: #1e293b; transform: translateY(-1px); }
        button:hover { background: #e6edf4; border-color: #cbd5e1; }
        button[disabled] {
            cursor: not-allowed;
            opacity: 0.55;
            transform: none !important;
            box-shadow: none;
        }
        button.pressed { background: #cbd5e1 !important; transform: scale(0.96); transition: 0.05s; }
        .other-tools-section { margin-top: 1rem; padding-top: 1rem; }
        .section-label {
            font-size: 0.85rem;
            font-weight: 500;
            color: #475569;
            margin-bottom: 1rem;
            padding-bottom: 0.6rem;
        }
        .cards-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
            gap: 1rem;
            justify-content: center;
        }
        .tool-card {
            background: #ffffff;
            border-radius: 20px;
            border: 2px solid #eef2f8;

            border-color: #cbdbe0;
            background: #fefefe;
        }
        .tool-card-name {
            font-weight: 600;
            font-size: 1rem;
        }
        .footer { text-align: center; font-size: 0.75rem; color: #8b9ab0; margin-top: 2rem; padding-top: 1rem; }
        @media (max-width: 700px) {

            .tool-card-name { font-size: 0.85rem; }
            .preview-frame { min-height: 220px; }
            .progress-meta { flex-direction: column; align-items: flex-start; }
            .upload-row > * { min-width: 0; }
            .file-pill { width: 100%; }
            .template-grid { grid-template-columns: 1fr; }
            .template-option { grid-template-columns: auto 1fr; justify-items: start; text-align: left; }
            .template-icon { width: 54px; height: 74px; }
            .crop-preview-frame { padding: 0.6rem; }
            .crop-preview-canvas { border-radius: 12px; }
            .crop-help { font-size: 0.8rem; }
        }
    </style>

    <script defer src="/assets/fulutool.js"></script>

<body>
<div class="container">
    <div class="tool-panel">
        <div class="tool-title">🗓️ 老挂历海报生成器</div>

        <div class="dropzone" id="dropzone">

        <div class="template-section">

            <div class="template-grid">

        </div>

        <div class="crop-shell" id="cropShell">
            <div class="preview-title" id="cropTitle">✂️ 照片裁剪</div>
            <div class="crop-stage">
                <div class="crop-preview-frame">
                    <canvas id="cropPreviewCanvas" class="crop-preview-canvas" width="960" height="720"></canvas>
                </div>
                <div class="crop-help" id="cropHelp">拖动选框调整照片区域，双指捏合可放大或缩小选区，也可拖动右下角圆点微调。</div>
            </div>
        </div>

        <div class="control-row">
            <div class="field">
                <label for="yearSelect">年份</label>
                <select id="yearSelect"></select>
            </div>
            <div class="field">
                <label for="monthSelect">月份</label>
                <select id="monthSelect"></select>
            </div>
            <div class="field">
                <label for="daySelect">日期</label>
                <select id="daySelect"></select>
            </div>
        </div>

        <div class="action-row">
            <button id="generateBtn" class="primary" disabled>⚡ 开始生成</button>
        </div>

        <div class="preview-shell">
            <div class="preview-title">📈 任务状态</div>
            <div class="preview-frame">
                <div class="task-stage">
                    <div class="task-stage-label" id="taskStageLabel">任务阶段</div>
                    <div class="task-stage-text" id="taskStageText">等待文件上传</div>
                </div>
                <div class="progress-shell">
                    <div class="progress-meta">

        <div class="save-row">

    <div class="other-tools-section">

            <a href="/tools.html" class="tool-card"><span class="tool-card-name">全部工具</span></a>
        </div>
    </div>
    <div class="footer">🧰 福禄工具箱 · 所有工具免费 | 独立页面 | 无跟踪</div>
</div>

        function getMonthShort(month) {

        function getMonthDays(year, month) {

        function toLunarDayText(dayNum) {
            const n = Number(dayNum);
            if (!Number.isFinite(n) || n < 1 || n > 30) return '';
            if (n <= 10) return `初${'一二三四五六七八九十'[n - 1]}`;
            if (n < 20) return `十${'一二三四五六七八九'[n - 11] || ''}`;
            if (n === 20) return '二十';
            if (n < 30) return `廿${'一二三四五六七八九'[n - 21] || ''}`;
            return '三十';
        }

        function getSolarTermForDate(year, month, day) {
            const termNames = [
                ['小寒', '大寒'], ['立春', '雨水'], ['惊蛰', '春分'], ['清明', '谷雨'],
                ['立夏', '小满'], ['芒种', '夏至'], ['小暑', '大暑'], ['立秋', '处暑'],
                ['白露', '秋分'], ['寒露', '霜降'], ['立冬', '小雪'], ['大雪', '冬至']
            ];
            const c20 = [6.11, 20.84, 4.6295, 19.4599, 6.3826, 21.4155, 5.59, 20.888, 6.318, 21.86, 6.5, 22.2, 7.928, 23.65, 8.35, 23.95, 8.44, 23.822, 9.098, 24.218, 8.218, 23.08, 7.9, 22.6];
            const c21 = [5.4055, 20.12, 3.87, 18.73, 5.63, 20.646, 4.81, 20.1, 5.52, 21.04, 5.678, 21.37, 7.108, 22.83, 7.5, 23.13, 7.646, 23.042, 8.318, 23.438, 7.438, 22.36, 7.18, 21.94];
            if (month < 1 || month > 12) return '';
            const y = year % 100;
            const idx = (month - 1) * 2;
            const use21 = year >= 2001;
            const coeffs = use21 ? c21 : c20;
            const leapBase = use21 ? Math.floor(y / 4) : Math.floor((y - 1) / 4);

            const d1 = Math.floor(y * 0.2422 + coeffs[idx]) - leapBase;
            const d2 = Math.floor(y * 0.2422 + coeffs[idx + 1]) - leapBase;
            if (day === d1) return termNames[month - 1][0];
            if (day === d2) return termNames[month - 1][1];
            return '';
        }

        function getLunarLabel(date) {
            try {
                const termName = getSolarTermForDate(date.getFullYear(), date.getMonth() + 1, date.getDate());
                if (termName) return termName;
                const text = new Intl.DateTimeFormat('zh-CN-u-ca-chinese', {
                    month: 'short',
                    day: 'numeric'
                }).format(date).replace(/\s/g, '');
                const match = text.match(/(闰?[正一二三四五六七八九十冬腊]+月)?(\d{1,2})日?/);
                if (!match) return '';
                const monthName = match[1] || '';
                const lunarDay = Number(match[2]);
                if (!Number.isFinite(lunarDay)) return '';
                if (lunarDay === 1 && monthName) return monthName;
                return toLunarDayText(lunarDay);
            } catch (error) {
                return '';
            }
        }

        function isCompactScreen() {
            return window.matchMedia('(max-width: 700px)').matches;
        }

        function getPosterPhotoRatio() {
            return 0.75;
        }

        function getPosterPanelGapRatio() {
            return 0.014;
        }

        function getPosterCropAspect() {
            if (selectedTemplate === 'side') return 9 / 16;
            return 1440 / Math.floor(2160 * getPosterPhotoRatio());
        }

        function updateCropCanvasSize() {
            if (!cropPreviewCanvas) return;

            let previewRatio = 4 / 3;
            if (currentImage) {
                const imageRatio = currentImage.width / currentImage.height || (4 / 3);
                const minRatio = isCompactScreen() ? 0.56 : 0.56;
                const maxRatio = isCompactScreen() ? 1.12 : 1.3;
                previewRatio = clamp(imageRatio, minRatio, maxRatio);
            }

            const renderWidth = isCompactScreen() ? 1120 : 1280;
            const renderHeight = Math.round(renderWidth / previewRatio);
            cropPreviewCanvas.width = renderWidth;
            cropPreviewCanvas.height = renderHeight;
            cropPreviewCanvas.style.aspectRatio = `${renderWidth} / ${renderHeight}`;
        }

        function getCropLayout() {
            if (!currentImage || !cropPreviewCanvas) return null;

            const canvasW = cropPreviewCanvas.width;
            const canvasH = cropPreviewCanvas.height;
            const imgRatio = currentImage.width / currentImage.height;
            const canvasRatio = canvasW / canvasH;
            let drawW;
            let drawH;
            let drawX;
            let drawY;

            if (imgRatio > canvasRatio) {
                drawW = canvasW;
                drawH = drawW / imgRatio;
                drawX = 0;
                drawY = (canvasH - drawH) / 2;
            } else {
                drawH = canvasH;
                drawW = drawH * imgRatio;
                drawY = 0;
                drawX = (canvasW - drawW) / 2;
            }

            const targetAspect = getPosterCropAspect();
            let maxCropW;
            let maxCropH;
            if (drawW / drawH > targetAspect) {
                maxCropH = drawH;
                maxCropW = maxCropH * targetAspect;
            } else {
                maxCropW = drawW;
                maxCropH = maxCropW / targetAspect;
            }

            return {
                canvasW,
                canvasH,
                drawW,
                drawH,
                drawX,
                drawY,
                maxCropW,
                maxCropH
            };
        }

        function getCropRect(img) {
            const targetAspect = getPosterCropAspect();
            let baseW;
            let baseH;
            if (img.width / img.height > targetAspect) {
                baseH = img.height;
                baseW = baseH * targetAspect;
            } else {
                baseW = img.width;
                baseH = baseW / targetAspect;
            }

            const scale = Math.min(1, Math.max(0.45, cropState.scale || 1));
            const cropW = baseW * scale;
            const cropH = baseH * scale;
            const maxX = Math.max(0, img.width - cropW);
            const maxY = Math.max(0, img.height - cropH);
            const sx = maxX * Math.min(1, Math.max(0, cropState.x));
            const sy = maxY * Math.min(1, Math.max(0, cropState.y));
            return { sx, sy, sw: cropW, sh: cropH };
        }

        function loadImageFromFile(file) {
            return new Promise((resolve, reject) => {
                const url = URL.createObjectURL(file);
                const img = new Image();
                img.onload = () => {
                    URL.revokeObjectURL(url);
                    resolve(img);
                };
                img.onerror = () => {
                    URL.revokeObjectURL(url);
                    reject(new Error('Image load failed'));
                };
                img.src = url;
            });
        }

        function drawCropPreview() {
            if (!cropPreviewCanvas) return;
            const ctx = cropPreviewCanvas.getContext('2d');
            if (!ctx) return;

            ctx.clearRect(0, 0, cropPreviewCanvas.width, cropPreviewCanvas.height);
            ctx.fillStyle = '#eef4f8';
            ctx.fillRect(0, 0, cropPreviewCanvas.width, cropPreviewCanvas.height);

            if (!currentImage) return;
            const layout = getCropLayout();
            if (!layout) return;
            const { canvasW, canvasH, drawW, drawH, drawX, drawY, maxCropW, maxCropH } = layout;

            ctx.drawImage(currentImage, drawX, drawY, drawW, drawH);

            const cropW = maxCropW * cropState.scale;
            const cropH = maxCropH * cropState.scale;
            const maxCropX = Math.max(0, drawW - cropW);
            const maxCropY = Math.max(0, drawH - cropH);
            const cropX = drawX + maxCropX * cropState.x;
            const cropY = drawY + maxCropY * cropState.y;

            ctx.save();
            ctx.fillStyle = 'rgba(15, 23, 42, 0.38)';
            ctx.fillRect(0, 0, canvasW, cropY);
            ctx.fillRect(0, cropY, cropX, cropH);
            ctx.fillRect(cropX + cropW, cropY, canvasW - (cropX + cropW), cropH);
            ctx.fillRect(0, cropY + cropH, canvasW, canvasH - (cropY + cropH));
            ctx.strokeStyle = '#ffffff';
            ctx.lineWidth = 2;
            ctx.strokeRect(cropX, cropY, cropW, cropH);

            const handleRadius = isCompactScreen() ? 18 : 12;
            const handleX = cropX + cropW;
            const handleY = cropY + cropH;
            ctx.fillStyle = '#ffffff';
            ctx.beginPath();
            ctx.arc(handleX, handleY, handleRadius, 0, Math.PI * 2);
            ctx.fill();
            ctx.strokeStyle = '#0f172a';
            ctx.lineWidth = 1.5;
            ctx.stroke();
            ctx.restore();

            cropPreviewCanvas.dataset.cropX = String(cropX);
            cropPreviewCanvas.dataset.cropY = String(cropY);
            cropPreviewCanvas.dataset.cropW = String(cropW);
            cropPreviewCanvas.dataset.cropH = String(cropH);
            cropPreviewCanvas.dataset.handleX = String(handleX);
            cropPreviewCanvas.dataset.handleY = String(handleY);
            cropPreviewCanvas.dataset.handleRadius = String(handleRadius);
        }

        function updateCropUi() {
            updateCropCanvasSize();
            drawCropPreview();
        }

        function clamp(value, min, max) {
            return Math.min(max, Math.max(min, value));
        }

        function getCanvasPoint(event) {
            const rect = cropPreviewCanvas.getBoundingClientRect();
            const clientX = event.clientX != null ? event.clientX : (event.touches && event.touches[0] ? event.touches[0].clientX : 0);
            const clientY = event.clientY != null ? event.clientY : (event.touches && event.touches[0] ? event.touches[0].clientY : 0);
            const x = (clientX - rect.left) * (cropPreviewCanvas.width / rect.width);
            const y = (clientY - rect.top) * (cropPreviewCanvas.height / rect.height);
            return { x, y };
        }

        function beginPinchInteraction() {
            if (!cropPreviewCanvas || activePointers.size < 2) return;
            const points = Array.from(activePointers.values()).slice(0, 2);
            const [first, second] = points;
            pinchInteraction.active = true;
            pinchInteraction.startDistance = Math.max(1, Math.hypot(second.x - first.x, second.y - first.y));
            pinchInteraction.startScale = cropState.scale;
            pinchInteraction.startMidX = (first.x + second.x) / 2;
            pinchInteraction.startMidY = (first.y + second.y) / 2;
            pinchInteraction.startBoxX = cropState.x;
            pinchInteraction.startBoxY = cropState.y;
            cropInteraction.mode = '';
            cropInteraction.pointerId = null;
            cropPreviewCanvas.classList.remove('is-dragging');
            cropPreviewCanvas.classList.add('is-resizing');
        }

        function movePinchInteraction() {
            if (!pinchInteraction.active || activePointers.size < 2) return;
            const layout = getCropLayout();
            if (!layout) return;

            const [first, second] = Array.from(activePointers.values()).slice(0, 2);
            const distance = Math.max(1, Math.hypot(second.x - first.x, second.y - first.y));
            const midX = (first.x + second.x) / 2;
            const midY = (first.y + second.y) / 2;
            const nextScale = clamp(
                pinchInteraction.startScale * (distance / pinchInteraction.startDistance),
                0.45,
                1
            );
            const cropW = layout.maxCropW * nextScale;
            const cropH = layout.maxCropH * nextScale;
            const maxCropX = Math.max(1, layout.drawW - cropW);
            const maxCropY = Math.max(1, layout.drawH - cropH);

            cropState.scale = nextScale;
            cropState.x = clamp(
                pinchInteraction.startBoxX + (midX - pinchInteraction.startMidX) / maxCropX,
                0,
                1
            );
            cropState.y = clamp(
                pinchInteraction.startBoxY + (midY - pinchInteraction.startMidY) / maxCropY,
                0,
                1
            );
            drawCropPreview();
        }

        function beginCropInteraction(event) {
            if (!currentImage || !cropPreviewCanvas) return;
            event.preventDefault();
            if (event.pointerId != null) {
                activePointers.set(event.pointerId, getCanvasPoint(event));
            }

            if (activePointers.size >= 2) {
                beginPinchInteraction();
                return;
            }

            const { x, y } = getCanvasPoint(event);
            const cropX = Number(cropPreviewCanvas.dataset.cropX || 0);
            const cropY = Number(cropPreviewCanvas.dataset.cropY || 0);
            const cropW = Number(cropPreviewCanvas.dataset.cropW || 0);
            const cropH = Number(cropPreviewCanvas.dataset.cropH || 0);
            const handleX = Number(cropPreviewCanvas.dataset.handleX || 0);
            const handleY = Number(cropPreviewCanvas.dataset.handleY || 0);
            const handleRadius = Number(cropPreviewCanvas.dataset.handleRadius || (isCompactScreen() ? 18 : 12));
            const handleHit = Math.hypot(x - handleX, y - handleY) <= handleRadius + (isCompactScreen() ? 12 : 8);
            const insideCrop = x >= cropX && x <= cropX + cropW && y >= cropY && y <= cropY + cropH;
            if (!handleHit && !insideCrop) return;

            cropInteraction.mode = handleHit ? 'resize' : 'move';
            cropInteraction.pointerId = event.pointerId != null ? event.pointerId : 1;
            cropInteraction.startX = x;
            cropInteraction.startY = y;
            cropInteraction.startBoxX = cropState.x;
            cropInteraction.startBoxY = cropState.y;
            cropInteraction.startScale = cropState.scale;
            cropPreviewCanvas.classList.toggle('is-dragging', cropInteraction.mode === 'move');
            cropPreviewCanvas.classList.toggle('is-resizing', cropInteraction.mode === 'resize');
            if (cropPreviewCanvas.setPointerCapture && event.pointerId != null) {
                cropPreviewCanvas.setPointerCapture(event.pointerId);
            }
        }

        function moveCropInteraction(event) {
            if (!currentImage || !cropPreviewCanvas) return;
            if (event.pointerId != null && activePointers.has(event.pointerId)) {
                activePointers.set(event.pointerId, getCanvasPoint(event));
            }

            if (pinchInteraction.active && activePointers.size >= 2) {
                event.preventDefault();
                movePinchInteraction();
                return;
            }

            if (!cropInteraction.mode || cropInteraction.pointerId !== event.pointerId) return;
            event.preventDefault();
            const { x, y } = getCanvasPoint(event);
            const layout = getCropLayout();
            if (!layout) return;
            const { drawW, drawH, maxCropW, maxCropH } = layout;

            if (cropInteraction.mode === 'move') {
                const cropW = maxCropW * cropState.scale;
                const cropH = maxCropH * cropState.scale;
                const maxCropX = Math.max(1, drawW - cropW);
                const maxCropY = Math.max(1, drawH - cropH);
                cropState.x = clamp(cropInteraction.startBoxX + (x - cropInteraction.startX) / maxCropX, 0, 1);
                cropState.y = clamp(cropInteraction.startBoxY + (y - cropInteraction.startY) / maxCropY, 0, 1);
            } else if (cropInteraction.mode === 'resize') {
                const delta = Math.max(x - cropInteraction.startX, y - cropInteraction.startY);
                const scaleDelta = delta / Math.max(maxCropW, maxCropH);
                cropState.scale = clamp(cropInteraction.startScale + scaleDelta, 0.45, 1);
                cropState.x = clamp(cropState.x, 0, 1);
                cropState.y = clamp(cropState.y, 0, 1);
            }

            drawCropPreview();
        }

        function endCropInteraction(event) {
            if (!cropPreviewCanvas) return;
            if (cropPreviewCanvas.releasePointerCapture && event.pointerId != null) {
                try { cropPreviewCanvas.releasePointerCapture(event.pointerId); } catch (err) {}
            }
            if (event.pointerId != null) {
                activePointers.delete(event.pointerId);
            }

            if (pinchInteraction.active && activePointers.size < 2) {
                pinchInteraction.active = false;
                cropPreviewCanvas.classList.remove('is-resizing');
            }

            if (cropInteraction.pointerId == null || cropInteraction.pointerId === event.pointerId || activePointers.size === 0) {
                cropInteraction.mode = '';
                cropInteraction.pointerId = null;
                cropPreviewCanvas.classList.remove('is-dragging', 'is-resizing');
            }
        }

        function drawImageCover(ctx, img, dx, dy, dw, dh, cropRect) {
            const rect = cropRect || getCropRect(img);
            const sx = rect.sx;
            const sy = rect.sy;
            const sw = rect.sw;
            const sh = rect.sh;
            ctx.drawImage(img, sx, sy, sw, sh, dx, dy, dw, dh);
        }

        function getGanzhiYear(year) {
            const stems = ['甲', '乙', '丙', '丁', '戊', '己', '庚', '辛', '壬', '癸'];
            const branches = ['子', '丑', '寅', '卯', '辰', '巳', '午', '未', '申', '酉', '戌', '亥'];
            const animals = ['鼠', '牛', '虎', '兔', '龙', '蛇', '马', '羊', '猴', '鸡', '狗', '猪'];
            const index = ((year - 4) % 60 + 60) % 60;
            return `${stems[index % 10]}${branches[index % 12]}${animals[index % 12]}年`;
        }

        function drawSelectedDayCircle(ctx, x, dayY, subY, dayText, dayNumberSize, lunarTextSize, width) {
            ctx.save();
            ctx.strokeStyle = '#b5475a';
            ctx.lineWidth = Math.max(2, Math.floor(width * 0.0018));
            const dayTextWidth = ctx.measureText(dayText).width || (dayNumberSize * 0.9);
            const lunarGap = Math.max(6, Math.floor(width * 0.005));
            const radiusForText = Math.max(dayNumberSize * 0.56, dayTextWidth * 0.64);
            const maxRadius = Math.max(dayNumberSize * 0.5, subY - dayY - lunarTextSize - lunarGap);
            const radius = Math.min(radiusForText, maxRadius);
            ctx.beginPath();
            ctx.arc(x, dayY, radius, 0, Math.PI * 2);
            ctx.stroke();
            ctx.restore();
        }

        function drawSideVerticalCalendar(ctx, width, height, year, month, birthdayDay, panelX) {
            const panelW = width - panelX;
            const panelBg = '#eef4f8';
            ctx.save();
            ctx.fillStyle = panelBg;
            ctx.fillRect(panelX, 0, panelW, height);

            const centerX = panelX + panelW / 2;
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';

            const yearY = Math.floor(height * 0.055);
            const monthDigitY = Math.floor(height * 0.127);
            const monthShortY = Math.floor(height * 0.176);
            const ganzhiY = Math.floor(height * 0.222);

            ctx.fillStyle = '#a74155';
            ctx.font = `700 ${Math.floor(width * 0.045)}px "Times New Roman", Georgia, "Songti SC", serif`;
            ctx.fillText(String(year), centerX, yearY);

            ctx.fillStyle = '#0f76a8';
            ctx.font = `800 ${Math.floor(width * 0.098)}px "Arial Black", "Helvetica Neue", Arial, sans-serif`;
            ctx.fillText(String(month), centerX, monthDigitY);

            ctx.fillStyle = '#0f76a8';
            ctx.font = `800 ${Math.floor(width * 0.025)}px "Arial Black", "Helvetica Neue", Arial, sans-serif`;
            ctx.fillText(getMonthShort(month), centerX, monthShortY);

            ctx.fillStyle = '#596a7c';
            ctx.font = `600 ${Math.floor(width * 0.012)}px "Noto Sans SC", "PingFang SC", sans-serif`;
            ctx.fillText(getGanzhiYear(year), centerX, ganzhiY);

            const days = getMonthDays(year, month);
            const weekZh = ['日', '一', '二', '三', '四', '五', '六'];
            const listTop = Math.floor(height * 0.262);
            const listBottom = Math.floor(height * 0.935);
            const rowH = (listBottom - listTop) / days;
            const weekX = panelX + panelW * 0.22;
            const dayX = panelX + panelW * 0.5;
            const lunarX = panelX + panelW * 0.78;
            const dayNumberSize = Math.floor(width * 0.024);
            const lunarTextSize = Math.floor(width * 0.0085);

            ctx.strokeStyle = 'rgba(36, 53, 74, 0.14)';
            ctx.lineWidth = 1;
            ctx.beginPath();
            ctx.moveTo(panelX + panelW * 0.14, listTop - rowH * 0.35);
            ctx.lineTo(panelX + panelW * 0.86, listTop - rowH * 0.35);
            ctx.stroke();

            for (let day = 1; day <= days; day += 1) {
                const date = new Date(year, month - 1, day);
                const weekIndex = date.getDay();
                const rowY = listTop + (day - 0.5) * rowH;
                const isBirthday = day === Number(birthdayDay);
                const mainColor = (weekIndex === 0 || isBirthday) ? '#b5475a' : '#233247';

                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillStyle = weekIndex === 0 ? '#b5475a' : '#556575';
                ctx.font = `600 ${Math.floor(width * 0.011)}px "Noto Sans SC", "PingFang SC", sans-serif`;
                ctx.fillText(weekZh[weekIndex], weekX, rowY);

                ctx.fillStyle = mainColor;
                ctx.font = `${dayNumberSize}px "Times New Roman", Georgia, "Songti SC", serif`;
                const dayText = String(day);
                ctx.fillText(dayText, dayX, rowY);
                if (isBirthday) {
                    ctx.save();
                    ctx.strokeStyle = '#b5475a';
                    ctx.lineWidth = Math.max(2, Math.floor(width * 0.0014));
                    const dayTextWidth = ctx.measureText(dayText).width || (dayNumberSize * 0.9);
                    const radius = Math.max(dayNumberSize * 0.55, dayTextWidth * 0.66);
                    ctx.beginPath();
                    ctx.arc(dayX, rowY, radius, 0, Math.PI * 2);
                    ctx.stroke();
                    ctx.restore();
                }

                const lunarLabel = getLunarLabel(date);
                if (lunarLabel) {
                    ctx.fillStyle = '#6c7b8b';
                    ctx.font = `${lunarTextSize}px "Noto Sans SC", "PingFang SC", "Microsoft YaHei", sans-serif`;
                    ctx.fillText(lunarLabel, lunarX, rowY);
                }
            }

            ctx.fillStyle = 'rgba(15, 23, 42, 0.26)';
            ctx.font = `700 ${Math.floor(width * 0.012)}px "Segoe UI", Arial, sans-serif`;
            ctx.fillText('fulutool.com', centerX, Math.floor(height * 0.965));
            ctx.restore();
        }

        function drawVintageCalendar(ctx, width, height, year, month, birthdayDay, splitY) {
            const panelY = Number.isFinite(splitY) ? Math.floor(splitY) : Math.floor(height * (getPosterPhotoRatio() + getPosterPanelGapRatio()));
            const panelH = height - panelY;
            ctx.fillStyle = '#eef4f8';
            ctx.fillRect(0, panelY, width, panelH);

            const leftAreaX = Math.floor(width * 0.02);
            const gridX = Math.floor(width * 0.22);
            const gridRightPadding = Math.floor(width * 0.03);
            const gridW = Math.max(420, width - gridX - gridRightPadding);
            const leftAreaW = Math.max(220, gridX - leftAreaX - Math.floor(width * 0.02));
            const leftCenterX = leftAreaX + leftAreaW / 2;
            const monthText = String(month);
            const cols = 14;
            const rows = 3;
            const colW = gridW / cols;
            const headerEnY = panelY + 16;
            const headerZhY = panelY + 40;
            const rowTop = panelY + 64;
            const rowH = Math.floor((panelH - 86) / rows);
            const colCenterX = (col) => {
                return gridX + col * colW + colW / 2;
            };

            ctx.fillStyle = '#a74155';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.font = `700 ${Math.floor(width * 0.048)}px "Times New Roman", Georgia, "Songti SC", serif`;
            ctx.fillText(String(year), leftCenterX, headerZhY);

            const gridCenterY = rowTop + (rows * rowH) / 2;
            const monthDigitSize = Math.floor(width * 0.12);
            const monthTextSize = Math.floor(width * 0.04);
            const monthGap = Math.floor(width * 0.014);
            const monthY = Math.round(gridCenterY - (monthDigitSize + monthGap + monthTextSize) / 2);
            const monthShortY = monthY + monthDigitSize + monthGap;

            ctx.fillStyle = '#0f76a8';
            ctx.textBaseline = 'top';
            ctx.font = `800 ${monthDigitSize}px "Arial Black", "Helvetica Neue", Arial, sans-serif`;
            ctx.fillText(monthText, leftCenterX, monthY);

            ctx.fillStyle = '#0f76a8';
            ctx.font = `800 ${monthTextSize}px "Arial Black", "Helvetica Neue", Arial, sans-serif`;
            ctx.fillText(getMonthShort(month), leftCenterX, monthShortY);

            const weekEn = ['SUN', 'MON', 'TUE', 'WED', 'THU', 'FRI', 'SAT'];
            const weekZh = ['日', '一', '二', '三', '四', '五', '六'];

            for (let i = 0; i < cols; i += 1) {
                const x = colCenterX(i);
                const widx = i % 7;
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillStyle = widx === 0 ? '#a74155' : '#2b3a4d';
                ctx.font = `700 ${Math.floor(width * 0.019)}px "Segoe UI", Arial, sans-serif`;
                ctx.fillText(weekEn[widx], x, headerEnY);
                ctx.fillStyle = '#7a8798';
                ctx.font = `${Math.floor(width * 0.015)}px "Noto Sans SC", sans-serif`;
                ctx.fillText(weekZh[widx], x, headerZhY);
            }

            const firstWeekday = new Date(year, month - 1, 1).getDay();
            const days = getMonthDays(year, month);

            ctx.strokeStyle = 'rgba(36, 53, 74, 0.18)';
            ctx.lineWidth = 1;
            for (let r = 0; r < rows; r += 1) {
                const y = rowTop + r * rowH;
                ctx.beginPath();
                ctx.moveTo(gridX, y);
                ctx.lineTo(gridX + gridW, y);
                ctx.stroke();
            }

            let day = 1;
            const dayNumberSize = Math.floor(width * 0.036);
            const starSize = Math.floor(width * 0.034);
            const lunarTextSize = Math.floor(width * 0.011);
            for (let idx = 0; idx < cols * rows; idx += 1) {
                const row = Math.floor(idx / cols);
                const col = idx % cols;
                const x = colCenterX(col);
                const dayY = rowTop + row * rowH + Math.floor(rowH * 0.36);
                const subY = rowTop + row * rowH + Math.floor(rowH * 0.75);
                const weekIndex = col % 7;

                if (idx >= firstWeekday && day <= days) {
                    const currentDay = day;
                    const isBirthday = currentDay === Number(birthdayDay);
                    ctx.fillStyle = (weekIndex === 0 || isBirthday) ? '#b5475a' : '#1c2d45';
                    const dayFont = `${dayNumberSize}px "Times New Roman", Georgia, "Songti SC", serif`;
                    ctx.font = dayFont;
                    ctx.textAlign = 'center';
                    ctx.textBaseline = 'middle';
                    const dayText = String(currentDay);
                    ctx.fillText(dayText, x, dayY);

                    if (isBirthday) {
                        drawSelectedDayCircle(ctx, x, dayY, subY, dayText, dayNumberSize, lunarTextSize, width);
                    }

                    const lunarLabel = getLunarLabel(new Date(year, month - 1, currentDay));
                    if (lunarLabel) {
                        ctx.fillStyle = '#6c7b8b';
                        ctx.textBaseline = 'alphabetic';
                        ctx.font = `${lunarTextSize}px "Noto Sans SC", "PingFang SC", "Microsoft YaHei", sans-serif`;
                        ctx.fillText(lunarLabel, x, subY);
                    }
                    day += 1;
                } else if (idx > firstWeekday + days - 1) {
                    ctx.fillStyle = weekIndex === 0 ? '#b5475a' : '#24354a';
                    ctx.font = `${starSize}px "Times New Roman", Georgia, serif`;
                    ctx.textAlign = 'center';
                    ctx.textBaseline = 'middle';
                    ctx.fillText('*', x, dayY + Math.floor(width * 0.0035));
                }
            }
        }

        function addOldPhotoStyle(ctx, width, photoHeight) {
            ctx.save();

            ctx.fillStyle = 'rgba(188, 138, 82, 0.045)';
            ctx.fillRect(0, 0, width, photoHeight);

            const sunFade = ctx.createLinearGradient(0, 0, 0, photoHeight);
            sunFade.addColorStop(0, 'rgba(255, 228, 172, 0.075)');
            sunFade.addColorStop(0.46, 'rgba(171, 120, 76, 0.02)');
            sunFade.addColorStop(1, 'rgba(112, 84, 56, 0.055)');
            ctx.fillStyle = sunFade;
            ctx.fillRect(0, 0, width, photoHeight);

            const sideBurn = ctx.createLinearGradient(0, 0, width, 0);
            sideBurn.addColorStop(0, 'rgba(84, 57, 33, 0.15)');
            sideBurn.addColorStop(0.14, 'rgba(84, 57, 33, 0.015)');
            sideBurn.addColorStop(0.86, 'rgba(84, 57, 33, 0.015)');
            sideBurn.addColorStop(1, 'rgba(84, 57, 33, 0.16)');
            ctx.fillStyle = sideBurn;
            ctx.fillRect(0, 0, width, photoHeight);

            for (let i = 0; i < 13750; i += 1) {
                const x = Math.random() * width;
                const y = Math.random() * photoHeight;
                const alpha = Math.random() * 0.05;
                const size = Math.random() * 0.95 + 0.18;
                ctx.fillStyle = `rgba(30, 26, 22, ${alpha})`;
                ctx.fillRect(x, y, size, size);
            }

            const vignette = ctx.createRadialGradient(width / 2, photoHeight / 2, width * 0.25, width / 2, photoHeight / 2, width * 0.82);
            vignette.addColorStop(0, 'rgba(0,0,0,0)');
            vignette.addColorStop(1, 'rgba(34, 24, 16, 0.16)');
            ctx.fillStyle = vignette;
            ctx.fillRect(0, 0, width, photoHeight);

            ctx.restore();
        }

        function addAgingEffects(ctx, width, height, splitY) {
            ctx.save();
            const panelY = Number.isFinite(splitY) ? splitY : Math.floor(height * (getPosterPhotoRatio() + getPosterPanelGapRatio()));
            ctx.fillStyle = 'rgba(202, 170, 120, 0.028)';
            ctx.fillRect(0, 0, width, height);

            for (let i = 0; i < 2860; i += 1) {
                const x = Math.random() * width;
                const y = Math.random() * height;
                const alpha = Math.random() * 0.03;
                const size = Math.random() * 1.1 + 0.25;
                ctx.fillStyle = `rgba(33, 28, 24, ${alpha})`;
                ctx.fillRect(x, y, size, size);
            }

            ctx.restore();
        }

        function drawWatermark(ctx, width, height) {
            ctx.save();
            ctx.font = `700 ${Math.floor(width * 0.026)}px "Segoe UI", Arial, sans-serif`;
            ctx.textAlign = 'right';
            ctx.textBaseline = 'alphabetic';
            ctx.fillStyle = 'rgba(15, 23, 42, 0.26)';
            ctx.fillText('fulutool.com', width - 26, height - 24);
            ctx.restore();
        }

        async function generatePoster() {
            if (!currentFile) {
                alert(T('selectPhotoFirst', '请先选择一张照片'));
                return;
            }

            isGenerating = true;
            generateBtn.disabled = true;
            saveBtn.disabled = true;
            clearPreview();
            generatedBlob = null;
            setTaskState('taskStageGenerating', 'progressGeneratingHint', 28, 'busy');

            try {
                const year = Number(yearSelect.value);
                const month = Number(monthSelect.value);
                const day = Number(daySelect.value);
                const image = currentImage || await loadImageFromFile(currentFile);
                setTaskState('taskStageGenerating', 'progressGeneratingHint', 56, 'busy');

                const canvas = document.createElement('canvas');
                canvas.width = 1440;
                canvas.height = 2160;
                const ctx = canvas.getContext('2d');
                if (!ctx) throw new Error('Canvas not supported');
                ctx.imageSmoothingEnabled = true;
                ctx.imageSmoothingQuality = 'high';

                ctx.fillStyle = '#eef4f8';
                ctx.fillRect(0, 0, canvas.width, canvas.height);

                if (selectedTemplate === 'side') {
                    const photoW = Math.floor(canvas.height * 9 / 16);
                    ctx.save();
                    ctx.filter = 'sepia(0.18) saturate(0.97) contrast(1.02) brightness(1.01)';
                    drawImageCover(ctx, image, 0, 0, photoW, canvas.height, getCropRect(image));
                    ctx.restore();
                    addOldPhotoStyle(ctx, photoW, canvas.height);
                    drawSideVerticalCalendar(ctx, canvas.width, canvas.height, year, month, day, photoW);
                    addAgingEffects(ctx, canvas.width, canvas.height, 0);
                } else {
                    const baseSplitY = Math.floor(canvas.height * getPosterPhotoRatio());
                    const panelGap = Math.floor(canvas.height * getPosterPanelGapRatio());
                    const calendarSplitY = baseSplitY + panelGap;
                    const photoX = 0;
                    const photoY = 0;
                    const photoW = canvas.width;
                    const photoH = baseSplitY;

                    ctx.save();
                    ctx.filter = 'sepia(0.18) saturate(0.97) contrast(1.02) brightness(1.01)';
                    drawImageCover(ctx, image, photoX, photoY, photoW, photoH, getCropRect(image));
                    ctx.restore();
                    addOldPhotoStyle(ctx, canvas.width, photoH);

                    drawVintageCalendar(ctx, canvas.width, canvas.height, year, month, day, calendarSplitY);
                    addAgingEffects(ctx, canvas.width, canvas.height, calendarSplitY);
                    drawWatermark(ctx, canvas.width, canvas.height);
                }

                setTaskState('taskStageGenerating', 'progressGeneratingHint', 85, 'busy');

                const blob = await new Promise((resolve, reject) => {
                    canvas.toBlob((b) => {
                        if (!b) reject(new Error('Poster export failed'));
                        else resolve(b);
                    }, 'image/png');
                });

                generatedBlob = blob;
                const templateSlug = selectedTemplate === 'side' ? 'side' : 'classic';
                generatedName = `fulutool-calendar-${templateSlug}-${year}-${String(month).padStart(2, '0')}-${String(day).padStart(2, '0')}.png`;
                clearPreview();
                previewDataUrl = canvas.toDataURL('image/png');
                previewUrl = previewDataUrl;
                resultPreview.src = previewDataUrl;
                resultPreviewWrap.classList.add('show');
                saveBtn.disabled = false;
                setTaskState('taskStageDone', 'progressDoneHint', 100, 'complete');
            } catch (error) {
                console.error(error);
                generatedBlob = null;
                saveBtn.disabled = true;
                clearPreview();
                setTaskState('taskStageFailed', 'progressFailedHint', 100, 'complete');
            } finally {
                isGenerating = false;
                generateBtn.disabled = !currentFile;
            }
        }

        function isMobileBrowser() {
            const ua = navigator.userAgent || '';
            return /Android|iPhone|iPad|iPod|Mobile|HarmonyOS/i.test(ua) || navigator.maxTouchPoints > 1;
        }

        function showToast(message) {
            if (!message) return;
            const existing = document.querySelector('.fulutool-toast');
            if (existing) {
                existing.remove();
            }

            const toast = document.createElement('div');
            toast.className = 'fulutool-toast';
            toast.textContent = message;
            Object.assign(toast.style, {
                position: 'fixed',
                left: '50%',
                top: '50%',
                transform: 'translate(-50%, -50%)',
                maxWidth: 'calc(100vw - 32px)',
                padding: '12px 16px',
                borderRadius: '14px',
                background: 'rgba(15, 23, 42, 0.9)',
                color: '#fff',
                fontSize: '14px',
                lineHeight: '1.5',
                textAlign: 'center',
                zIndex: '9999',
                boxShadow: '0 10px 30px rgba(15, 23, 42, 0.24)',
                opacity: '0',
                transition: 'opacity 0.2s ease'
            });

            document.body.appendChild(toast);
            requestAnimationFrame(() => {
                toast.style.opacity = '1';
            });

            setTimeout(() => {
                toast.style.opacity = '0';
                setTimeout(() => toast.remove(), 220);
            }, 3000);
        }

        async function savePoster() {
            if (!generatedBlob) {
                alert(T('saveFirst', '请先生成挂历海报'));
                return;
            }
            const ua = navigator.userAgent || '';
            const isWeChat = /MicroMessenger/i.test(ua);
            const isMobile = isMobileBrowser();
            if (isWeChat) {
                if (resultPreviewWrap && !resultPreviewWrap.classList.contains('show')) {
                    resultPreviewWrap.classList.add('show');
                }
                if (resultPreviewWrap) {
                    resultPreviewWrap.scrollIntoView({ behavior: 'smooth', block: 'center' });
                }
                alert(T('saveWechatTip', '微信内置浏览器不支持直接下载。请长按下方预览图并选择“保存图片”'));
                return;
            }

            const url = URL.createObjectURL(generatedBlob);
            const link = document.createElement('a');
            link.href = url;
            link.download = generatedName || 'fulutool-calendar.png';
            link.style.display = 'none';
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
            setTimeout(() => URL.revokeObjectURL(url), 1000);
            if (isMobile) {
                setTimeout(() => {
                    showToast(T('saveMobileDoneShare', '图片已保存。欢迎继续分享至微博、小红书、朋友圈'));
                }, 260);
                return;
            }
            setTimeout(() => {
                alert(T('saveDoneShare', '图片已保存。欢迎分享至微信、微博、小红书等社交平台'));
            }, 120);
        }

        async function applySelectedFile(file) {
            if (!file) {
                currentFile = null;
                currentImage = null;
                generatedBlob = null;
                saveBtn.disabled = true;
                generateBtn.disabled = true;
                if (cropShell) cropShell.classList.remove('show');
                clearPreview();
                updateCropUi();
                syncStaticText();
                return;
            }
            if (!file.type.startsWith('image/')) {
                alert(T('invalidImage', '请选择有效的图片文件'));
                return;
            }
            try {
                const image = await loadImageFromFile(file);
                currentFile = file;
                currentImage = image;
                cropState = { scale: 1, x: 0.5, y: 0.5 };
                cropInteraction = {
                    mode: '',
                    pointerId: null,
                    startX: 0,
                    startY: 0,
                    startBoxX: 0,
                    startBoxY: 0,
                    startScale: 1
                };
                pinchInteraction = {
                    active: false,
                    startDistance: 0,
                    startScale: 1,
                    startMidX: 0,
                    startMidY: 0,
                    startBoxX: 0,
                    startBoxY: 0
                };
                activePointers.clear();
                generatedBlob = null;
                saveBtn.disabled = true;
                generateBtn.disabled = false;
                if (cropShell) cropShell.classList.add('show');
                clearPreview();
                updateCropUi();
                syncStaticText();
            } catch (error) {
                console.error(error);
                alert(T('invalidImage', '请选择有效的图片文件'));
            }
        }

        selectPhotoBtn.addEventListener('click', () => {
            addPressedEffect(selectPhotoBtn);
            photoInput.click();
        });

        photoInput.addEventListener('change', () => {
            applySelectedFile(photoInput.files && photoInput.files[0] ? photoInput.files[0] : null);
        });

        ['dragenter', 'dragover'].forEach((eventName) => {
            dropzone.addEventListener(eventName, (event) => {
                event.preventDefault();
                event.stopPropagation();
                dropzone.classList.add('is-dragover');
            });
        });

        ['dragleave', 'dragend', 'drop'].forEach((eventName) => {
            dropzone.addEventListener(eventName, (event) => {
                event.preventDefault();
                event.stopPropagation();
                if (eventName !== 'drop') dropzone.classList.remove('is-dragover');
            });
        });

        dropzone.addEventListener('drop', (event) => {
            dropzone.classList.remove('is-dragover');
            const files = event.dataTransfer && event.dataTransfer.files;
            if (!files || !files.length) return;
            const [file] = files;
            try {
                const dt = new DataTransfer();
                dt.items.add(file);
                photoInput.files = dt.files;
            } catch (err) {}
            applySelectedFile(file);
        });

        generateBtn.addEventListener('click', () => {
            addPressedEffect(generateBtn);
            generatePoster();
        });

        saveBtn.addEventListener('click', () => {
            addPressedEffect(saveBtn);
            savePoster();
        });

        templateOptions.forEach((option) => {
            option.addEventListener('click', () => {
                addPressedEffect(option);
                setTemplate(option.dataset.template);
            });
        });

        if (cropPreviewCanvas) {
            cropPreviewCanvas.addEventListener('pointerdown', beginCropInteraction);
            cropPreviewCanvas.addEventListener('pointermove', moveCropInteraction);
            cropPreviewCanvas.addEventListener('pointerup', endCropInteraction);
            cropPreviewCanvas.addEventListener('pointercancel', endCropInteraction);
            cropPreviewCanvas.addEventListener('pointerleave', (event) => {
                if (cropInteraction.mode && !cropPreviewCanvas.hasPointerCapture?.(event.pointerId)) {
                    endCropInteraction(event);
                }
            });
        }

        window.addEventListener('resize', () => {
            if (currentImage) {
                updateCropUi();
            }
        });

        populateYearMonth();
        updateDayOptions(new Date().getDate());

        yearSelect.addEventListener('change', () => {
            updateDayOptions();
        });
        monthSelect.addEventListener('change', () => {
            updateDayOptions();
        });

        window.FULUTOOL_HOOKS = window.FULUTOOL_HOOKS || {};
        const previousReady = window.FULUTOOL_HOOKS.onReady;
        const previousLanguageChange = window.FULUTOOL_HOOKS.onLanguageChange;
        window.FULUTOOL_HOOKS.onReady = function (lang) {
            if (typeof previousReady === 'function') previousReady(lang);
            syncStaticText(lang);
            updateCropUi();
        };
        window.FULUTOOL_HOOKS.onLanguageChange = function (lang) {
            if (typeof previousLanguageChange === 'function') previousLanguageChange(lang);
            syncStaticText(lang);
            updateCropUi();
        };

        window.addEventListener('beforeunload', () => {
            clearPreview();
        });
    })();
</script>
</body>
</html>
